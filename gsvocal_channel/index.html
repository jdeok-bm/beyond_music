<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 성장 분석 2025</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }
  .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px 60px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .card { background: #1a1d27; border-radius: 12px; padding: 24px; border: 1px solid #2a2d3a; }
  .card .label { font-size: 0.85rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 2rem; font-weight: 700; color: #fff; }
  .card .sub { font-size: 0.85rem; color: #64b5f6; margin-top: 8px; }

  .section { margin-bottom: 40px; }
  .section-title { font-size: 1.2rem; font-weight: 600; color: #e0e0e0; margin-bottom: 20px; padding-left: 12px; border-left: 4px solid #5c6bc0; }

  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-box { background: #1a1d27; border-radius: 12px; border: 1px solid #2a2d3a; padding: 12px; }
  .chart-full { background: #1a1d27; border-radius: 12px; border: 1px solid #2a2d3a; padding: 12px; position: relative; }

  .quarter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .quarter-card { background: #1a1d27; border-radius: 12px; border: 1px solid #2a2d3a; padding: 24px; }
  .quarter-card h3 { font-size: 1rem; color: #e0e0e0; margin-bottom: 24px; font-weight: 500; }
  .q-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-label { font-size: 0.9rem; color: #bbb; width: 85px; }
  .q-bar-wrap { flex: 1; margin: 0 12px; height: 10px; background: #2a2d3a; border-radius: 5px; overflow: hidden; }
  .q-bar { height: 100%; border-radius: 5px; transition: width 0.8s ease; }
  .bar-q1 { background: #26c6da; }
  .bar-q2 { background: #5c6bc0; }
  .bar-q3 { background: #ab47bc; }
  .bar-q4 { background: #f06292; }
  .q-val { font-size: 0.95rem; color: #fff; font-weight: 600; white-space: nowrap; width: 70px; text-align: right; }

  @media (max-width: 900px) {
    .chart-grid { grid-template-columns: 1fr; }
    .quarter-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- 연간 요약 -->
  <div class="section" id="section-annual">
    <div class="section-title" id="annual-title">연간 요약</div>
    <div class="cards" id="annual-cards">
      <div class="card"><div class="label">팔로워 순증가</div><div class="value" id="kpi-follower">—</div><div class="sub" id="kpi-follower-sub">로드 중...</div></div>
      <div class="card"><div class="label">총 조회수</div><div class="value" id="kpi-views">—</div><div class="sub" id="kpi-views-sub">로드 중...</div></div>
      <div class="card"><div class="label">총 업로드</div><div class="value" id="kpi-uploads">—</div><div class="sub" id="kpi-uploads-sub">로드 중...</div></div>
    </div>
  </div>

  <!-- 분기별 성장 비교 -->
  <div class="section">
    <div class="section-title" id="quarter-title">분기별 성장 비교</div>
    <div class="quarter-grid" id="quarter-grid">
      <!-- JS로 채워짐 -->
    </div>
  </div>

    <!-- Monthly Charts -->
  <div class="section">
    <div class="section-title">월별 팔로워 & 조회수 추이</div>
    <div class="chart-grid">
      <div class="chart-box"><div id="chart-monthly-follower" style="height:320px;"></div></div>
      <div class="chart-box"><div id="chart-monthly-views" style="height:320px;"></div></div>
    </div>
  </div>

  <!-- Monthly Upload -->
  <div class="section">
    <div class="section-title">월별 콘텐츠 업로드 수</div>
    <div class="chart-full"><div id="chart-monthly-uploads" style="height:300px;"></div></div>
  </div>

  <!-- Time Series Chart -->
  <div class="section">
    <div class="section-title">시계열 분석 — Daily 조회수 & 누적 팔로워</div>
    <div class="chart-full">
      <div id="chart-timeseries" style="height:600px;"></div>
      <div style="position: absolute; top: 12px; right: 20px; font-size: 0.85rem; color: #fff; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; pointer-events: none;">
        💡 아래 트랙의 마커를 클릭하면 해당 콘텐츠(URL)로 이동합니다.
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:24px; flex-wrap:wrap; padding-left:12px;">
      <div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:16px;background:rgba(255,165,0,0.25);border:1px solid rgba(255,165,0,0.5);border-radius:4px;"></div><span style="font-size:0.9rem;color:#aaa;">오리지널 캠페인 기간</span></div>
      <div style="display:flex;align-items:center;gap:8px;"><div style="width:12px;height:12px;background:#64b5f6;border-radius:50%;"></div><span style="font-size:0.9rem;color:#aaa;">수급 콘텐츠 업로드</span></div>
      <div style="display:flex;align-items:center;gap:8px;"><div style="width:12px;height:12px;background:#ffb74d;border-radius:50%;"></div><span style="font-size:0.9rem;color:#aaa;">오리지널 콘텐츠 업로드</span></div>
      <div style="display:flex;align-items:center;gap:8px;"><div style="width:20px;height:2px;background:#4db6ac;"></div><span style="font-size:0.9rem;color:#aaa;">조회수 4주 이동평균선</span></div>
    </div>
  </div>
</div>

<script>

// ── CSV fetch & parse ────────────────────────────────────────────────
function parseNum(s) {
  if (!s || s.trim() === '') return 0;
  return parseInt(s.replace(/,/g, '').trim(), 10) || 0;
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ''; }
      else { cur += ch; }
    }
    fields.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (fields[i] || '').trim(); });
    return obj;
  });
}

function parseDate(s) {
  const m = s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\./);
  if (!m) return null;
  return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
}

function buildDATA(rows) {
  const records = rows
    .map(r => ({ ...r, date_str: parseDate(r.date) }))
    .filter(r => r.date_str !== null);

  const dates = records.map(r => r.date_str);
  const daily_views = records.map(r => parseNum(r.daily_views));
  const total_followers = records.map(r => parseNum(r.channel_total_followers));

  // 4주(28일) 이동평균선
  const window28 = 28;
  const trendline = daily_views.map((_, i) => {
    const start = Math.max(0, i - window28 + 1);
    const slice = daily_views.slice(start, i + 1);
    const avg = slice.reduce((a, b) => a + b, 0) / slice.length;
    return Math.round(avg);
  });

  // Monthly aggregates
  const monthMap = {};
  records.forEach(r => {
    const ym = r.date_str.slice(0, 7);
    if (!monthMap[ym]) monthMap[ym] = { followers: 0, views: 0, supply: 0, original: 0 };
    const m = monthMap[ym];
    m.views += parseNum(r.daily_views);
    m.followers += parseNum(r.daily_follower);
    if (r.upload_contents === '수급') m.supply++;
    if (r.upload_contents === '오리지널') m.original++;
  });
  const months = Object.keys(monthMap).sort();
  const monthly_labels = months.map(ym => {
    const [y, mo] = ym.split('-');
    return `${y}.${parseInt(mo, 10)}월`;
  });
  const monthly_views    = months.map(ym => monthMap[ym].views);
  const monthly_follower = months.map(ym => monthMap[ym].followers);
  const monthly_supply   = months.map(ym => monthMap[ym].supply);
  const monthly_original = months.map(ym => monthMap[ym].original);

  // Upload markers
  const supply = records
    .filter(r => r.upload_contents === '수급' && r.content_name)
    .map(r => ({
      date_str: r.date_str, content_name: r.content_name, url: r.url,
      view_cnt: parseNum(r.view_cnt), like_cnt: parseNum(r.like_cnt), comment_cnt: parseNum(r.comment_cnt)
    }));
  const original = records
    .filter(r => r.upload_contents === '오리지널' && r.content_name)
    .map(r => ({
      date_str: r.date_str, content_name: r.content_name, url: r.url,
      view_cnt: parseNum(r.view_cnt), like_cnt: parseNum(r.like_cnt), comment_cnt: parseNum(r.comment_cnt)
    }));

  // Campaign ranges (consecutive original windows within 30-day gap)
  const origDates = original.map(d => d.date_str).sort();
  const campaign_ranges = [];
  if (origDates.length > 0) {
    let x0 = origDates[0], x1 = origDates[0];
    for (let i = 1; i < origDates.length; i++) {
      const diff = (new Date(origDates[i]) - new Date(x1)) / 86400000;
      if (diff <= 30) { x1 = origDates[i]; }
      else { campaign_ranges.push({ x0, x1 }); x0 = origDates[i]; x1 = origDates[i]; }
    }
    campaign_ranges.push({ x0, x1 });
  }

  return {
    dates, daily_views, total_followers, trendline,
    monthly_labels, monthly_views, monthly_follower,
    monthly_supply, monthly_original,
    supply, original, campaign_ranges
  };
}

// ── Loading indicator ─────────────────────────────────────────────────
const loadingEl = document.createElement('div');
loadingEl.id = 'csv-loading';
loadingEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:32px 48px;color:#e0e0e0;font-size:1rem;z-index:9999;text-align:center;';
loadingEl.innerHTML = '⏳ 데이터 로드 중...';
document.body.appendChild(loadingEl);

// ── Fetch & render ────────────────────────────────────────────────────
fetch('channel_data.csv')
  .then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.text();
  })
  .then(text => {
    document.body.removeChild(loadingEl);
    const rows = parseCSV(text);
    const DATA = buildDATA(rows);
    renderCharts(DATA);
  })
  .catch(err => {
    document.body.removeChild(loadingEl);
    document.querySelector('.container').insertAdjacentHTML('afterbegin',
      `<div style="background:#3a1a1a;border:1px solid #f06292;border-radius:8px;padding:20px;margin-bottom:24px;color:#f06292;">
        ⚠️ CSV 데이터 로드 오류: ${err.message}<br>
        <small style="color:#aaa;margin-top:8px;display:block;">
          index.html과 <code>channel_data.csv</code>가 같은 폴더에 있어야 합니다.<br>
          로컬에서 열 경우 웹서버(예: <code>python -m http.server</code>)를 통해 실행하세요.
        </small>
      </div>`);
  });

function renderCharts(DATA) {

  // ── 연간 요약 KPI ──────────────────────────────────────────────────
  const firstDate = DATA.dates[0];
  const lastDate  = DATA.dates[DATA.dates.length - 1];
  const firstFollower = DATA.total_followers[0];
  const lastFollower  = DATA.total_followers[DATA.total_followers.length - 1];
  const followerDiff  = lastFollower - firstFollower;
  const totalViews    = DATA.daily_views.reduce((a, b) => a + b, 0);
  const totalSupply   = DATA.supply.length;
  const totalOriginal = DATA.original.length;
  const totalUploads  = totalSupply + totalOriginal;

  function fmtDate(d) { return d.replace(/-/g, '.'); }
  function fmtViews(v) {
    if (v >= 1e8) return (v/1e8).toFixed(1) + '억';
    if (v >= 1e4) return (v/1e4).toFixed(1) + '만';
    return v.toLocaleString();
  }

  document.getElementById('annual-title').textContent =
    `연간 요약 (${fmtDate(firstDate)} ~ ${fmtDate(lastDate)})`;
  document.getElementById('kpi-follower').textContent =
    (followerDiff >= 0 ? '+' : '') + followerDiff.toLocaleString();
  document.getElementById('kpi-follower-sub').textContent =
    `${firstFollower.toLocaleString()}명 → ${lastFollower.toLocaleString()}명`;
  document.getElementById('kpi-views').textContent =
    fmtViews(totalViews);
  document.getElementById('kpi-views-sub').textContent =
    totalViews.toLocaleString() + ' views';
  document.getElementById('kpi-uploads').textContent =
    totalUploads.toLocaleString();
  document.getElementById('kpi-uploads-sub').textContent =
    `수급 ${totalSupply}건 / 오리지널 ${totalOriginal}건`;

  // ── 분기별 집계 ────────────────────────────────────────────────────
  const qDef = [
    { key: '1Q', label: '1Q (1~3월)', months: [1,2,3], barCls: 'bar-q1' },
    { key: '2Q', label: '2Q (4~6월)', months: [4,5,6], barCls: 'bar-q2' },
    { key: '3Q', label: '3Q (7~9월)', months: [7,8,9], barCls: 'bar-q3' },
    { key: '4Q', label: '4Q (10~12월)', months: [10,11,12], barCls: 'bar-q4' },
  ];

  const qStats = {};
  qDef.forEach(q => { qStats[q.key] = { views: 0, follower: 0, supply: 0, original: 0 }; });

  DATA.dates.forEach((d, i) => {
    const mo = parseInt(d.slice(5, 7), 10);
    const q = qDef.find(q => q.months.includes(mo));
    if (!q) return;
    qStats[q.key].views    += DATA.daily_views[i];
    // daily_follower 는 DATA에 없으므로 total_followers diff 로 근사
  });
  // follower per quarter: total_followers 에서 구간 first/last diff
  qDef.forEach(q => {
    const idxArr = DATA.dates.reduce((a, d, i) => {
      const mo = parseInt(d.slice(5,7), 10);
      if (q.months.includes(mo)) a.push(i);
      return a;
    }, []);
    if (idxArr.length === 0) return;
    qStats[q.key].follower = DATA.total_followers[idxArr[idxArr.length-1]] - DATA.total_followers[idxArr[0]-1 >= 0 ? idxArr[0]-1 : idxArr[0]] + (idxArr[0] === 0 ? 0 : 0);
    // simpler: sum daily_follower via monthly data
  });
  // Use monthly_follower for more accuracy
  DATA.monthly_labels.forEach((lbl, i) => {
    const mo = parseInt(lbl.match(/\.(\d+)월/)[1], 10);
    const q = qDef.find(q => q.months.includes(mo));
    if (!q) return;
    qStats[q.key].follower += DATA.monthly_follower[i];
    qStats[q.key].supply   += DATA.monthly_supply[i];
    qStats[q.key].original += DATA.monthly_original[i];
  });

  // ── 분기별 카드 렌더링 ──────────────────────────────────────────────
  const qGrid = document.getElementById('quarter-grid');
  const qTitleEl = document.getElementById('quarter-title');
  // 데이터 있는 분기만
  const activeQs = qDef.filter(q => qStats[q.key].views > 0);
  qTitleEl.textContent = `분기별 성장 비교 (${activeQs[0].key} ~ ${activeQs[activeQs.length-1].key})`;

  const metrics = [
    { title: '팔로워 순증가', getter: q => qStats[q].follower, fmt: v => (v>=0?'+':'')+v.toLocaleString() },
    { title: '총 조회수',     getter: q => qStats[q].views,    fmt: v => fmtViews(v) },
    { title: '콘텐츠 업로드 수', getter: q => qStats[q].supply + qStats[q].original, fmt: v => v+'건' },
  ];

  metrics.forEach(metric => {
    const vals = activeQs.map(q => metric.getter(q.key));
    const maxVal = Math.max(...vals);
    let card = `<div class="quarter-card"><h3>${metric.title}</h3>`;
    activeQs.forEach((q, i) => {
      const pct = maxVal > 0 ? (vals[i] / maxVal * 100).toFixed(2) : 0;
      card += `<div class="q-row">
        <span class="q-label">${q.label}</span>
        <div class="q-bar-wrap"><div class="q-bar ${q.barCls}" style="width:${pct}%"></div></div>
        <span class="q-val">${metric.fmt(vals[i])}</span>
      </div>`;
    });
    card += `</div>`;
    qGrid.insertAdjacentHTML('beforeend', card);
  });



const plotlyLayout = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: '#12151e',
  font: { color: '#c0c0c0', size: 12 },
  xaxis: { gridcolor: '#2a2d3a', tickfont: { size: 11 } },
  yaxis: { gridcolor: '#2a2d3a', tickfont: { size: 11 } },
  margin: { t: 30, r: 20, b: 40, l: 60 },
  legend: { bgcolor: 'rgba(0,0,0,0)', font: { color: '#c0c0c0' } },
  bargap: 0.3,
};

Plotly.newPlot('chart-monthly-follower', [{
  x: DATA.monthly_labels, y: DATA.monthly_follower, type: 'bar', name: '팔로워 순증가',
  marker: { color: DATA.monthly_follower.map(v => v >= 0 ? '#5c6bc0' : '#ef5350'), opacity: 0.85 },
  text: DATA.monthly_follower.map(v => v >= 0 ? '+'+v.toLocaleString() : v.toLocaleString()),
  textposition: 'outside', textfont: { size: 11, color: '#ccc' },
  hovertemplate: '%{x}<br>팔로워: %{y:,}<extra></extra>',
}], { ...plotlyLayout, title: { text: '월별 팔로워 순증가', font: { size: 14, color: '#fff' }, x: 0.5 }, yaxis: { ...plotlyLayout.yaxis, title: '팔로워 수' } }, { responsive: true, displayModeBar: false });

Plotly.newPlot('chart-monthly-views', [{
  x: DATA.monthly_labels, y: DATA.monthly_views, type: 'bar', name: '조회수',
  marker: { color: '#26c6da', opacity: 0.85 },
  text: DATA.monthly_views.map(v => (v/10000).toFixed(0)+'만'),
  textposition: 'outside', textfont: { size: 11, color: '#ccc' },
  hovertemplate: '%{x}<br>조회수: %{y:,}<extra></extra>',
}], { ...plotlyLayout, title: { text: '월별 조회수', font: { size: 14, color: '#fff' }, x: 0.5 }, yaxis: { ...plotlyLayout.yaxis, title: '조회수' } }, { responsive: true, displayModeBar: false });

Plotly.newPlot('chart-monthly-uploads', [
  { x: DATA.monthly_labels, y: DATA.monthly_supply, type: 'bar', name: '수급', marker: { color: '#64b5f6', opacity: 0.9 }, hovertemplate: '%{x}<br>수급: %{y}건<extra></extra>' },
  { x: DATA.monthly_labels, y: DATA.monthly_original, type: 'bar', name: '오리지널', marker: { color: '#ffb74d', opacity: 0.9 }, hovertemplate: '%{x}<br>오리지널: %{y}건<extra></extra>' }
], { ...plotlyLayout, barmode: 'stack', title: { text: '월별 콘텐츠 업로드 (수급 + 오리지널)', font: { size: 14, color: '#fff' }, x: 0.5 }, yaxis: { ...plotlyLayout.yaxis, title: '업로드 건수', dtick: 2 }, legend: { ...plotlyLayout.legend, orientation: 'h', y: -0.2 } }, { responsive: true, displayModeBar: false });

// --- Time Series Setup ---
const supplyDates = DATA.supply.map(d => d.date_str);
const supplyRailY = DATA.supply.map(() => 0.65); 
const supplyText = DATA.supply.map(d => `<b>${d.content_name}</b><br>조회수: ${Number(d.view_cnt).toLocaleString()}<br>좋아요: ${Number(d.like_cnt).toLocaleString()}<br>댓글: ${Number(d.comment_cnt).toLocaleString()}<br><span style="color:#64b5f6;">🖱️ 클릭하여 영상 보기</span>`);
const supplyCustomData = DATA.supply.map(d => ({ url: d.url }));

const originalDates = DATA.original.map(d => d.date_str);
const originalRailY = DATA.original.map(() => 0.35); 
const originalText = DATA.original.map(d => `<b>[오리지널] ${d.content_name}</b><br>조회수: ${Number(d.view_cnt).toLocaleString()}<br>좋아요: ${Number(d.like_cnt).toLocaleString()}<br>댓글: ${Number(d.comment_cnt).toLocaleString()}<br><span style="color:#ffb74d;">🖱️ 클릭하여 영상 보기</span>`);
const originalCustomData = DATA.original.map(d => ({ url: d.url }));

const shapes = DATA.campaign_ranges.map(r => ({ type: 'rect', xref: 'x', yref: 'paper', x0: r.x0, x1: r.x1, y0: 0.20, y1: 1, fillcolor: 'rgba(255,165,0,0.12)', line: { width: 0 }, layer: 'below' }));
const annotations = DATA.campaign_ranges.map(r => ({ x: r.x0, y: 1, xref: 'x', yref: 'paper', text: '🎯 오리지널<br>캠페인', showarrow: false, font: { size: 10, color: 'rgba(255,165,0,0.8)' }, xanchor: 'left', yanchor: 'top' }));

const tsLayout = {
  ...plotlyLayout, shapes: shapes, annotations: annotations,
  title: { text: 'Daily 조회수 & 누적 팔로워 시계열', font: { size: 14, color: '#fff' }, x: 0.5 },
  xaxis: { ...plotlyLayout.xaxis, type: 'date', title: '' },
  yaxis: { 
    ...plotlyLayout.yaxis, 
    domain: [0.20, 1], 
    title: 'Daily 조회수', 
    titlefont: { color: '#26c6da' }, 
    tickfont: { color: '#26c6da', size: 11 }, 
    side: 'left' 
  },
  yaxis2: { 
    domain: [0.20, 1],
    title: '누적 팔로워 수', 
    titlefont: { color: '#ab47bc' }, 
    tickfont: { color: '#ab47bc', size: 11 }, 
    overlaying: 'y', 
    side: 'right', 
    gridcolor: 'rgba(171,71,188,0.1)', 
    showgrid: false,
    range: [0, 50000] // Added y-axis range constraint
  },
  yaxis3: {
    domain: [0, 0.15],
    showgrid: false,
    zeroline: false,
    showticklabels: false,
    range: [0, 1],
    fixedrange: true,
    title: '업로드<br>트랙',
    titlefont: { color: '#888', size: 10 }
  },
  legend: { ...plotlyLayout.legend, orientation: 'h', y: -0.15 },
  margin: { t: 40, r: 80, b: 60, l: 70 },
  hoverlabel: { bgcolor: '#1e2030', bordercolor: '#3a3d4a', font: { size: 12, color: '#e0e0e0' } },
  hovermode: 'closest'
};

var tsChartData = [
  // Y1: Daily Views
  { x: DATA.dates, y: DATA.daily_views, type: 'scatter', mode: 'lines', name: 'Daily 조회수', line: { color: 'rgba(38, 198, 218, 0.4)', width: 1.5 }, yaxis: 'y', hoverinfo: 'x+y', hovertemplate: '%{x}<br>조회수: %{y:,}<extra></extra>' },
  // Y1: Trendline (Linear Regression)
  { x: DATA.dates, y: DATA.trendline, type: 'scatter', mode: 'lines', name: '4주 이동평균선', line: { color: '#4db6ac', width: 2, dash: 'dash' }, yaxis: 'y', hoverinfo: 'none' },
  // Y2: Total Followers (Cumulative)
  { x: DATA.dates, y: DATA.total_followers, type: 'scatter', mode: 'lines', name: '누적 팔로워 수', line: { color: '#ab47bc', width: 2.5, shape: 'spline' }, yaxis: 'y2', hoverinfo: 'x+y', hovertemplate: '%{x}<br>누적 팔로워: %{y:,}<extra></extra>' },
  // Marker Tracks (Y3)
  { x: supplyDates, y: supplyRailY, type: 'scatter', mode: 'markers', name: '수급 콘텐츠', yaxis: 'y3', marker: { color: '#64b5f6', size: 10, symbol: 'circle', line: { color: '#fff', width: 1 } }, text: supplyText, customdata: supplyCustomData, hovertemplate: '%{text}<extra></extra>' },
  { x: originalDates, y: originalRailY, type: 'scatter', mode: 'markers', name: '오리지널 콘텐츠', yaxis: 'y3', marker: { color: '#ffb74d', size: 12, symbol: 'star', line: { color: '#fff', width: 1 } }, text: originalText, customdata: originalCustomData, hovertemplate: '%{text}<extra></extra>' }
];

var tsChart = document.getElementById('chart-timeseries');
Plotly.newPlot(tsChart, tsChartData, tsLayout, { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ['lasso2d','select2d', 'zoomIn2d', 'zoomOut2d', 'autoScale2d'] });

// --- Handle Clicks for Links ---
tsChart.on('plotly_click', function(data){
  if(data.points && data.points[0].customdata && data.points[0].customdata.url) {
    var url = data.points[0].customdata.url;
    if(url) {
      window.open(url, '_blank');
    }
  }
});
} // end renderCharts


</script>
