const SU_COLOR = '#60a5fa';
const ORI_COLOR = '#fb923c';
const MARKER_COLOR = '#fbbf24';

function formatNum(n) {
  if (!n) return '-';
  let s = String(n).replace(/,/g, '');
  let num = parseInt(s);
  if (isNaN(num)) return n;
  if (num >= 10000) return (num/10000).toFixed(1) + '만';
  return num.toLocaleString();
}

function renderCharts(charts, colId, lineColor) {
  const col = document.getElementById(colId);
  charts.forEach((c, idx) => {
    const divId = `chart_${colId}_${idx}`;
    const card = document.createElement('div');
    card.className = 'chart-card';
    const titleEl = document.createElement('div');
    titleEl.className = 'chart-title';
    titleEl.textContent = c.title;
    card.appendChild(titleEl);
    const chartDiv = document.createElement('div');
    chartDiv.id = divId;
    card.appendChild(chartDiv);
    col.appendChild(card);

    const markerMap = {};
    c.markers.forEach(m => { markerMap[m.date] = m; });
    const markerDates = c.dates.filter(d => markerMap[d]);
    const markerRevs = markerDates.map(d => c.revenues[c.dates.indexOf(d)]);
    const markerTexts = markerDates.map(d => {
      const m = markerMap[d];
      return `📺 ${m.content_name || ''}<br>👁 ${formatNum(m.view_cnt)} | 👍 ${formatNum(m.like_cnt)} | 💬 ${m.comment_cnt || '-'} | 구분: ${m.type || '-'}`;
    });

    const traces = [
      {
        x: c.dates,
        y: c.revenues,
        type: 'scatter',
        mode: 'lines',
        connectgaps: false,
        name: 'Revenue',
        line: { color: lineColor, width: 2 },
        hovertemplate: '%{x}<br>Revenue: %{y:.3f}<extra></extra>'
      },
      {
        x: markerDates,
        y: markerRevs,
        type: 'scatter',
        mode: 'markers',
        name: '콘텐츠 발행',
        marker: { color: MARKER_COLOR, size: 10, symbol: 'star', line: { color: '#fff', width: 1 } },
        text: markerTexts,
        hovertemplate: '%{x}<br>%{text}<extra></extra>'
      }
    ];

    const layout = {
      height: 260,
      paper_bgcolor: 'transparent',
      plot_bgcolor: 'transparent',
      margin: { t: 10, b: 50, l: 50, r: 20 },
      xaxis: {
        color: '#6b7280',
        tickfont: { size: 10 },
        gridcolor: '#2d2d4a',
        tickangle: -30,
        range: [c.dates[0], c.dates[c.dates.length - 1]]
      },
      yaxis: {
        color: '#6b7280',
        tickfont: { size: 10 },
        gridcolor: '#2d2d4a',
        title: { text: 'Revenue', font: { size: 10, color: '#6b7280' } }
      },
      legend: { font: { size: 10, color: '#9ca3af' }, bgcolor: 'transparent' },
      hoverlabel: { bgcolor: '#1e293b', font: { size: 12, color: '#e2e8f0' } }
    };

    Plotly.newPlot(divId, traces, layout, {responsive: true, displayModeBar: false});
  });
}
