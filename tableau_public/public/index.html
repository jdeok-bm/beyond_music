<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond Music Dashboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Tableau CDN/API 사전 연결 (TLS handshake 선행으로 로드 시간 단축) -->
  <link rel="preconnect" href="https://prod-kr-a.online.tableau.com" crossorigin>
  <link rel="dns-prefetch" href="https://prod-kr-a.online.tableau.com">
  <!-- /dashboards.json 과 /api/token 은 동일 도메인이라 별도 preconnect 불필요 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tableau Embedding API v3 -->
  <!-- embedding.tableauusercontent.com 이 KR에서 403 차단되는 환경이 있어, 사이트 자체 CDN을 사용합니다 -->
  <script type="module" src="https://prod-kr-a.online.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <!-- /dashboards.json 을 미리 가져와서 첫 렌더 지연 최소화 (/api/token 은 POST라 preload 불가하여 JS에서 warmup) -->
  <link rel="preload" href="/dashboards.json" as="fetch">
  <style>
    /* ─── Design Tokens ─── */
    :root, [data-theme="light"] {
      --color-bg:              #f5f5f3;
      --color-surface:         #fafaf8;
      --color-surface-2:       #ffffff;
      --color-surface-offset:  #eeede9;
      --color-divider:         #e0deda;
      --color-border:          #d6d3ce;
      --color-text:            #1a1916;
      --color-text-muted:      #6b6a66;
      --color-text-faint:      #b0afa9;
      --color-primary:         #01696f;
      --color-primary-hover:   #0c4e54;
      --color-primary-highlight: #d0dedd;
      --color-success:         #437a22;
      --color-warning:         #da7101;
      --color-error:           #a12c7b;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --font-body: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
      --space-16: 4rem;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --sidebar-w: 260px;
      --topbar-h: 56px;
    }
    [data-theme="dark"] {
      --color-bg:              #141413;
      --color-surface:         #1a1917;
      --color-surface-2:       #1f1e1c;
      --color-surface-offset:  #1d1c1a;
      --color-divider:         #262523;
      --color-border:          #333230;
      --color-text:             #cdccca;
      --color-text-muted:      #767472;
      --color-text-faint:      #4e4d4b;
      --color-primary:         #4f98a3;
      --color-primary-hover:   #227f8b;
      --color-primary-highlight: #2b3a3b;
      --color-success:         #6daa45;
      --color-warning:         #fdab43;
      --color-error:           #d163a7;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:#141413; --color-surface:#1a1917; --color-surface-2:#1f1e1c;
        --color-surface-offset:#1d1c1a; --color-divider:#262523; --color-border:#333230;
        --color-text:#cdccca; --color-text-muted:#767472; --color-text-faint:#4e4d4b;
        --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#2b3a3b;
        --color-success:#6daa45; --color-warning:#fdab43; --color-error:#d163a7;
        --shadow-sm:0 1px 2px oklch(0 0 0 / 0.25); --shadow-md:0 4px 12px oklch(0 0 0 / 0.35);
        --shadow-lg:0 12px 32px oklch(0 0 0 / 0.45);
      }
    }

    /* ─── Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
    }
    img, svg { display: block; max-width: 100%; }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    a, button, [role="button"] {
      transition: color var(--transition), background var(--transition),
                  border-color var(--transition), box-shadow var(--transition);
    }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ─── Layout Shell ─── */
    .app-shell { display: flex; height: 100dvh; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
      transition: transform var(--transition);
    }
    .sidebar-header {
      padding: var(--space-5) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .logo-mark {
      width: 32px; height: 32px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.2;
    }
    .logo-sub {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 400;
    }

    .sidebar-section-label {
      padding: var(--space-4) var(--space-4) var(--space-2);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-text-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .nav-list { list-style: none; padding: 0 var(--space-3); }
    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      font-weight: 500;
    }
    .nav-link:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .nav-link.active {
      background: var(--color-primary-highlight);
      color: var(--color-primary);
    }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ─── Dashboard Groups (카테고리) ─── */
    .nav-groups { padding: var(--space-2) 0; }
    .nav-group { margin-bottom: 2px; }
    .nav-group-header {
      display: flex; align-items: center; gap: var(--space-2);
      margin: 0 var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .nav-group-header:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .nav-group-header .chevron { width: 12px; height: 12px; transition: transform var(--transition); flex-shrink: 0; }
    .nav-group-header span.label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-group-count {
      margin-left: auto;
      font-size: 10px; font-weight: 600;
      background: var(--color-surface-offset);
      color: var(--color-text-muted);
      padding: 1px 7px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }
    .nav-group.collapsed .chevron { transform: rotate(-90deg); }
    .nav-group.collapsed .nav-list { display: none; }

    .sidebar-footer {
      margin-top: auto;
      padding: var(--space-4);
      border-top: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-info { display: flex; align-items: center; gap: var(--space-3); }
    .user-avatar {
      width: 30px; height: 30px;
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--color-primary);
    }
    .user-name { font-size: var(--text-xs); font-weight: 500; }
    .user-role { font-size: 11px; color: var(--color-text-muted); }

    /* ─── Theme Toggle ─── */
    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-muted);
    }
    .theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

    /* ─── Main Content ─── */
    .main-content {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-width: 0;
    }

    /* ─── Top Bar ─── */
    .topbar {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0 var(--space-6);
      height: var(--topbar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: var(--space-4);
      z-index: 50;
    }
    .mobile-menu-btn {
      display: none;
      width: 36px; height: 36px;
      align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
    }
    .mobile-menu-btn:hover { background: var(--color-surface-offset); }
    .page-breadcrumb {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }
    .page-breadcrumb strong {
      color: var(--color-text); font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm); font-weight: 500;
      cursor: pointer; border: none; text-decoration: none;
    }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid oklch(from var(--color-text) l c h / 0.12);
    }
    .btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .btn svg { width: 15px; height: 15px; }

    /* ─── Page Body: 대시보드가 화면 전체를 채웁니다 ─── */
    .page-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .view-section { display: none; flex: 1; min-height: 0; flex-direction: column; }
    .view-section.active { display: flex; }

    /* ─── Tableau Embed (꽉 채움) ─── */
    .embed-fill { position: relative; flex: 1; min-height: 0; background: var(--color-surface-offset); }
    .embed-fill iframe, .embed-fill tableau-viz { display: block; width: 100%; height: 100%; border: none; }
    .tableau-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: var(--space-3);
      background: var(--color-surface-offset);
      z-index: 2;
    }
    .tableau-loading.hidden { display: none; }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--color-divider);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: var(--text-xs); color: var(--color-text-muted); text-align: center; }

    /* 대시보드 URL 미설정 안내 (관리자가 URL을 아직 등록하지 않은 경우) */
    .embed-placeholder {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      gap: var(--space-3);
    }
    .placeholder-icon { width: 48px; height: 48px; color: var(--color-text-faint); margin-bottom: var(--space-2); }
    .placeholder-title { font-size: var(--text-base); font-weight: 600; color: var(--color-text); }
    .placeholder-desc { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 36ch; }

    /* 표시할 대시보드가 하나도 없을 때 */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: var(--space-3); color: var(--color-text-muted); text-align: center; padding: var(--space-8);
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--color-text-faint); }

    /* ─── Overlay (mobile) ─── */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: oklch(0 0 0 / 0.4);
      z-index: 90;
    }

    /* ─── Toast ─── */
    .toast-container {
      position: fixed; bottom: var(--space-6); right: var(--space-6);
      display: flex; flex-direction: column; gap: var(--space-2);
      z-index: 200;
    }
    .toast {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      display: flex; align-items: center; gap: var(--space-3);
      box-shadow: var(--shadow-lg);
      font-size: var(--text-xs); font-weight: 500;
      animation: slideUp 0.25s ease;
      max-width: 340px;
    }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .toast-success .toast-icon { color: var(--color-success); }
    .toast-error .toast-icon { color: var(--color-error); }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0 var(--space-4); }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="주 메뉴">
    <div class="sidebar-header">
      <!-- SVG Logo -->
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none" aria-label="Beyond Music Dashboards">
        <rect width="32" height="32" rx="8" fill="var(--color-primary)"/>
        <rect x="8" y="18" width="4" height="7" rx="1" fill="white" opacity="0.9"/>
        <rect x="14" y="13" width="4" height="12" rx="1" fill="white"/>
        <rect x="20" y="7" width="4" height="18" rx="1" fill="white" opacity="0.75"/>
      </svg>
      <div>
        <div class="logo-text">Beyond Music Dashboards</div>
      </div>
    </div>

    <div class="sidebar-section-label">대시보드</div>
    <div class="nav-groups" id="dashboardNavGroups">
      <!-- 동적으로 채워짐 (카테고리별 그룹) -->
    </div>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">이</div>
        <div>
          <div class="user-name">이종덕</div>

      <button class="theme-toggle" data-theme-toggle aria-label="다크 모드 전환">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

  <!-- Main -->
  <div class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

      <div class="page-breadcrumb" id="pageBreadcrumb">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <strong id="breadcrumbTitle">대시보드</strong>

      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="handleRefresh()" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          새로고침
        </button>
      </div>
    </header>

    <main class="page-body">
      <!-- 대시보드 뷰 (동적 생성) -->
      <div id="dashboardViews" style="display:flex; flex-direction:column; flex:1; min-height:0;"></div>
    </main>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── 유틸 ───
function _escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}

// ─── State ───
let dashboards = JSON.parse(localStorage.getItem('tb_dashboards') || '[]');
let categoryOrder = JSON.parse(localStorage.getItem('tb_category_order') || '[]');
let currentView = 'dashboard-0';
let _hadLocal = dashboards.length > 0; // 최초 로드 시 로컬 캐시 유무 기록 (재방문자는 즉시 렌더)
const _resizeObservers = new Map(); // wrapperId -> ResizeObserver (뷰 재생성 시 정리용)

// ─── 공용 설정(/dashboards.json) 로더 ───
// repo에 있는 공용 JSON을 가져와, 방문자의 캐시가 비어 있으면 기본값으로 사용합니다.
// 이 포털은 뷰 전용이며 편집 기능은 /admin 에서만 제공됩니다.
async function loadSharedConfig() {
  try {
    const res = await fetch('/dashboards.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data || !Array.isArray(data.dashboards)) return null;
    return {
      categoryOrder: Array.isArray(data.categories) ? data.categories : [],
      dashboards: data.dashboards.map(d => ({
        id: d.id || ('dash-shared-' + Math.random().toString(36).slice(2, 9)),
        name: d.name || '대시보드',
        category: d.category || '',
        url: normalizeTableauUrl(d.url || ''),
        height: Number(d.height) || 800,
        refresh: d.refresh || 'daily',
        desc: d.desc || '',
        createdAt: d.createdAt || new Date().toISOString(),
      })),
    };
  } catch (e) {
    console.warn('[shared-config] /dashboards.json 로드 실패:', e);
    return null;
  }
}

// ─── JWT 토큰 캐시 ───
// Vercel 서버리스 함수(/api/token)에서 발급받은 JWT를 캐싱합니다.
// 토큰 유효기간은 5분이며, 만료 30초 전에 자동으로 갱신됩니다.
const _jwt = {
  value: null,
  expiresAt: 0,
  pending: null,
  isValid() {
    return this.value && Date.now() < this.expiresAt - 30_000;
  },
  async fetch() {
    if (this.isValid()) return this.value;
    if (this.pending) return this.pending;
    this.pending = (async () => {
      try {
        const res = await fetch('/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const bodyText = await res.text();
        let body = null;
        try { body = JSON.parse(bodyText); } catch { /* non-JSON */ }
        if (!res.ok) {
          const err = new Error('HTTP ' + res.status);
          err.status = res.status;
          err.body = body || bodyText;
          throw err;
        }
        if (!body || !body.token) {
          const err = new Error('토큰 형식 오류');
          err.status = res.status;
          err.body = body || bodyText;
          throw err;
        }
        this.value = body.token;
        this.expiresAt = Date.now() + (body.expiresIn ? body.expiresIn * 1000 : 5 * 60 * 1000);
        return this.value;
      } catch (err) {
        console.error('[JWT] 토큰 발급 실패:', err, err.body);
        this.value = null;
        throw err;
      } finally {
        this.pending = null;
      }
    })();
    return this.pending;
  }
};

async function injectToken(vizId) {
  const viz = document.getElementById(vizId);
  if (!viz) return false;
  try {
    const token = await _jwt.fetch();
    viz.setAttribute('token', token);
    return true;
  } catch (err) {
    const loader = document.getElementById(vizId.replace('viz-', 'loading-'));
    if (loader) {
      const status = err && err.status ? ('HTTP ' + err.status) : (err && err.message) || '네트워크 오류';
      let detail = '';
      if (err && err.body && typeof err.body === 'object') {
        if (err.body.message) detail = err.body.message;
        if (Array.isArray(err.body.missing) && err.body.missing.length) {
          detail += (detail ? ' — ' : '') + '누락 변수: ' + err.body.missing.join(', ');
        }
      } else if (err && err.body) {
        detail = String(err.body).slice(0, 160);
      }
      loader.innerHTML = '<div style="color:var(--color-error);font-size:var(--text-xs);padding:var(--space-4);text-align:center;line-height:1.5;">⚠️ 인증 토큰을 가져오지 못했습니다.<br><span style="opacity:.85;">' + _escapeHtml(status) + (detail ? ' · ' + _escapeHtml(detail) : '') + '</span><br><button onclick="retryEmbed(\'' + vizId + '\')" style="margin-top:8px;padding:4px 12px;border:1px solid var(--color-error);border-radius:4px;background:transparent;color:var(--color-error);cursor:pointer;font-size:11px;">다시 시도</button></div>';
    }
    return false;
  }
}

async function retryEmbed(vizId) {
  _jwt.value = null;
  const loader = document.getElementById(vizId.replace('viz-', 'loading-'));
  if (loader) {
    loader.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">인증 중...</div>';
    loader.classList.remove('hidden');
  }
  await injectToken(vizId);
}

// ─── 카테고리 그룹핑 ───
// /dashboards.json 의 categories 배열(admin 페이지에서 관리)로 그룹 순서를 정하고,
// 거기 없는 카테고리는 처음 등장한 순서대로 뒤에 붙입니다. 카테고리가 없는 대시보드는 "기타" 로 묶입니다.
function getGroupedDashboards() {
  const UNCATEGORIZED = '기타';
  const seen = new Set();
  const order = [];
  categoryOrder.forEach(c => { if (c && !seen.has(c)) { seen.add(c); order.push(c); } });
  dashboards.forEach(d => {
    const c = (d.category || '').trim() || UNCATEGORIZED;
    if (!seen.has(c)) { seen.add(c); order.push(c); }
  });
  if (seen.has(UNCATEGORIZED)) {
    order.splice(order.indexOf(UNCATEGORIZED), 1);
    order.push(UNCATEGORIZED);
  }
  return order
    .map(key => ({
      key,
      label: key,
      indices: dashboards.reduce((acc, d, i) => {
        const c = (d.category || '').trim() || UNCATEGORIZED;
        if (c === key) acc.push(i);
        return acc;
      }, []),
    }))
    .filter(g => g.indices.length > 0);
}

function getCollapsedGroups() {
  try { return new Set(JSON.parse(localStorage.getItem('tb_collapsed_groups') || '[]')); }

}
function setCollapsedGroups(set) {

}
function toggleGroup(key) {
  const collapsed = getCollapsedGroups();
  if (collapsed.has(key)) collapsed.delete(key); else collapsed.add(key);
  setCollapsedGroups(collapsed);
  renderSidebarNav();
}

function renderDashboardViews() {
  // 이전 뷰의 ResizeObserver 정리 (메모리 누수 방지)
  _resizeObservers.forEach(ro => ro.disconnect());
  _resizeObservers.clear();

  const container = document.getElementById('dashboardViews');

  if (!dashboards.length) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <div>표시할 대시보드가 아직 없습니다.</div>
      </div>`;
    return;
  }

  container.innerHTML = dashboards.map((d, i) => `
    <section class="view-section ${currentView === 'dashboard-'+i ? 'active' : ''}" id="view-dashboard-${i}">
      <div class="embed-fill" id="wrapper-${d.id}">
        ${d.url ? renderEmbed(d) : renderPlaceholder()}
      </div>
    </section>
  `).join('');

  // 각 wrapper 크기에 맞춰 임베드 높이를 채우고, 창 크기/사이드바 토글에도 자동으로 맞춥니다.
  dashboards.forEach(d => {
    if (!d.url) return;
    const wrapper = document.getElementById('wrapper-' + d.id);
    const embedEl = document.getElementById('viz-' + d.id);
    if (!wrapper || !embedEl) return;
    const apply = () => {
      const h = Math.max(300, Math.floor(wrapper.clientHeight));
      embedEl.setAttribute('height', String(h));
    };
    apply();
    const ro = new ResizeObserver(apply);
    ro.observe(wrapper);
    _resizeObservers.set(d.id, ro);
  });

  // Viz 로드 이벤트 바인딩 + JWT 토큰 주입
  // Tableau Cloud 대시보드: /api/token 에서 JWT를 받아와 token 속성에 주입합니다.
  dashboards.forEach(d => {
    if (d.url && !isPublicUrl(d.url)) {
      const viz = document.getElementById('viz-' + d.id);
      const loader = document.getElementById('loading-' + d.id);
      if (viz && loader) {
        const t0 = performance.now();
        const stamp = (label) => {
          const dt = Math.round(performance.now() - t0);
          console.log(`[tableau-viz:${d.id}] +${dt}ms ${label}`);
        };
        const setStage = (text, sub) => {
          const textEl = loader.querySelector('.loading-text');
          if (textEl) {
            textEl.innerHTML = text + (sub
              ? `<br><span style="display:block;margin-top:4px;font-size:10px;opacity:.7;">${sub}</span>`
              : '');
          }
        };
        const hideLoader = () => loader.classList.add('hidden');
        const showError = (msg) => {
          loader.innerHTML = '<div style="color:var(--color-error);font-size:var(--text-xs);padding:var(--space-4);text-align:center;">' + (msg || '⚠️ 대시보드를 불러올 수 없습니다.') + '</div>';
        };
        if (viz.workbook) { hideLoader(); return; }

        // 전체 Tableau 이벤트를 콘솔에 기록 (디버깅용)
        ['firstinteractive','firstvizsizeknown','workbookready','vizloaderror','tabswitched','editinprogress','error']
          .forEach(evt => viz.addEventListener(evt, e => {
            stamp(evt);
            console.log('[tableau-viz:' + d.id + ']', evt, e && e.detail);
          }));

        // 단계별 로더 텍스트 전환 — "인증 중..." 이 데이터 로딩·렌더링 시간까지 모두 포함해 길어 보이던 문제를 해결
        viz.addEventListener('workbookready',      () => setStage('워크북 준비 완료', '데이터 렌더링 대기…'));
        viz.addEventListener('firstvizsizeknown',  () => setStage('차트 그리는 중…',   '복잡한 대시보드는 수십 초 걸릴 수 있습니다'));
        viz.addEventListener('firstinteractive',   () => { stamp('firstinteractive(hideLoader)'); hideLoader(); });
        viz.addEventListener('vizloaderror', (e) => {
          const detail = e && e.detail ? JSON.stringify(e.detail).slice(0, 200) : '';
          showError('⚠️ 대시보드 로딩 실패. URL 및 권한을 확인하세요.' + (detail ? '<br><span style="opacity:.7;font-size:10px;">' + _escapeHtml(detail) + '</span>' : ''));
        });

        // 타임아웃 안전망 (60초로 늘림 — 큰 대시보드는 25초로 부족)
        setTimeout(() => {
          if (!loader.classList.contains('hidden') && !loader.innerHTML.includes('⚠️')) {
            loader.innerHTML = '<div style="color:var(--color-error);font-size:var(--text-xs);padding:var(--space-4);text-align:center;line-height:1.5;">⚠️ 응답 시간 초과 (60초)<br><span style="opacity:.85;">Tableau 서버 응답 지연 · 대시보드 크기 · 권한 확인</span><br><button onclick="retryEmbed(\'viz-' + d.id + '\')" style="margin-top:8px;padding:4px 12px;border:1px solid var(--color-error);border-radius:4px;background:transparent;color:var(--color-error);cursor:pointer;font-size:11px;">다시 시도</button></div>';
          }
        }, 60000);

        // JWT 토큰 주입 (비동기). 토큰이 주입되면 tableau-viz 가 인증을 재개합니다.
        stamp('token-fetch 시작');
        setStage('인증 중…', 'JWT 토큰 요청');
        injectToken('viz-' + d.id).then((ok) => {
          if (!ok) return; // 실패 시 injectToken 내부에서 에러 메시지 처리됨
          stamp('token-injected');
          setStage('Tableau 연결 중…', '서버에서 워크북 정의를 받는 중');
        });
      }
    }
  });
}

// ─── URL 타입 감지 ───
function isPublicUrl(url) {
  if (!url) return false;
  return url.includes('public.tableau.com');
}

// ─── Tableau Cloud URL 정규화 ───
// Tableau Cloud 웹 UI는 '/#/site/SITE/views/WORKBOOK/VIEW' 형식이지만,
// <tableau-viz>의 src 속성은 '/t/SITE/views/WORKBOOK/VIEW' 형식을 요구합니다.
// 사용자가 주소창에서 복사한 URL도 자동으로 올바른 임베드 URL로 변환합니다.
function normalizeTableauUrl(url) {
  if (!url) return url;
  if (isPublicUrl(url)) return url;
  try {
    const m = url.match(/^(https?:\/\/[^/]+)\/(?:#\/)?site\/([^/]+)\/views\/(.+?)(?:\?.*)?$/i)
           || url.match(/^(https?:\/\/[^/]+)\/#\/site\/([^/]+)\/views\/(.+?)(?:\?.*)?$/i);
    if (m) {
      const [, origin, site, rest] = m;
      // 내부 추적 파라미터(?:iid=…)는 제거해 임베드 동작을 안정화합니다.
      const cleanRest = rest.split('?')[0];
      return `${origin}/t/${site}/views/${cleanRest}`;
    }
    // 이미 /t/SITE/views/... 형식이면 그대로
    if (/\/t\/[^/]+\/views\//.test(url)) return url.split('?')[0];
    // Default Site의 /#/views/... → /views/...
    const m2 = url.match(/^(https?:\/\/[^/]+)\/#\/views\/(.+?)(?:\?.*)?$/i);
    if (m2) {
      const [, origin, rest] = m2;
      return `${origin}/views/${rest.split('?')[0]}`;
    }
    return url;
  } catch {
    return url;
  }
}

// ─── 임베드 렌더링 (URL 타입에 따라 분기) ───
// height 는 초기값만 지정하고, 렌더 직후 ResizeObserver 가 wrapper 크기에 맞춰 다시 조정합니다.
function renderEmbed(d) {
  const initialHeight = Math.max(300, window.innerHeight - 56);
  if (isPublicUrl(d.url)) {
    // Tableau Public: ?:embed=y 파라미터로 iframe 임베딩 (로그인 불필요)
    const url = new URL(d.url);
    url.searchParams.set(':embed', 'y');
    url.searchParams.set(':showVizHome', 'no');
    url.searchParams.set(':tabs', 'no');
    url.searchParams.set(':toolbar', 'no');
    return `
      <div class="tableau-loading" id="loading-${d.id}">
        <div class="loading-spinner"></div>
        <div class="loading-text">대시보드를 불러오는 중...</div>
      </div>
      <iframe
        id="viz-${d.id}"
        src="${url.toString()}"
        height="${initialHeight}"
        allowfullscreen
        onload="document.getElementById('loading-${d.id}')?.classList.add('hidden')"
        onerror="(function(el){el.innerHTML='<div style=\\'color:var(--color-error);font-size:var(--text-xs);padding:var(--space-4);\\'>⚠️ 대시보드를 불러올 수 없습니다. URL을 확인하세요.</div>';})(document.getElementById('loading-${d.id}'))">
      </iframe>`;
  } else {
    // Tableau Cloud: JWT 토큰 주입 후 <tableau-viz> 웹 컴포넌트로 임베딩
    // token 속성은 renderDashboardViews() 후 injectToken()이 비동기로 채워줍니다.
    const embedSrc = normalizeTableauUrl(d.url);
    return `
      <div class="tableau-loading" id="loading-${d.id}">
        <div class="loading-spinner"></div>
        <div class="loading-text">인증 중...</div>
      </div>
      <tableau-viz
        id="viz-${d.id}"
        src="${embedSrc}"
        height="${initialHeight}"
        hide-tabs
        toolbar="hidden">
      </tableau-viz>`;
  }
}

function renderPlaceholder() {
  return `<div class="embed-placeholder">
    <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    <div class="placeholder-title">아직 URL이 설정되지 않았습니다</div>
    <div class="placeholder-desc">관리자에게 대시보드 URL 등록을 요청해주세요.</div>

// ─── Navigation ───
function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  const idx = parseInt(view.split('-')[1]);
  const section = document.getElementById('view-dashboard-' + idx);
  if (section) section.classList.add('active');
  const d = dashboards[idx];
  document.getElementById('breadcrumbTitle').textContent = d ? d.name : '대시보드';
  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.view === view);
  });
  // Mobile: close sidebar
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
}

function handleRefresh() {
  if (currentView.startsWith('dashboard-')) {
    const idx = parseInt(currentView.split('-')[1]);
    const d = dashboards[idx];
    if (d && d.url) {
      const viz = document.getElementById('viz-' + d.id);
      const loader = document.getElementById('loading-' + d.id);
      if (viz && loader) {
        loader.classList.remove('hidden');
        loader.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">새로고침 중...</div>';
        viz.refreshDataAsync ? viz.refreshDataAsync().then(() => loader.classList.add('hidden')) : location.reload();
      }
    }
  }
  showToast('새로고침 완료', 'success');
}

// ─── Toast ───
function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `
    <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      ${type === 'success' ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}
    </svg>
    ${msg}
  `;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ─── Bootstrap 로딩 상태 표시 (첫 방문자 전용) ───
function renderBootstrapLoading() {
  if (!document.getElementById('bootstrap-loading-style')) {
    const st = document.createElement('style');
    st.id = 'bootstrap-loading-style';
    st.textContent = `
      @keyframes tp-spin{to{transform:rotate(360deg)}}
      #bootstrap-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:var(--space-4);color:var(--color-text-muted);}
      #bootstrap-loading .sp{width:40px;height:40px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:tp-spin 0.8s linear infinite;}
    `;
    document.head.appendChild(st);
  }
  const body = document.querySelector('.page-body');
  if (!body) return;
  const existing = document.getElementById('bootstrap-loading');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'bootstrap-loading';
  div.innerHTML = `
    <div class="sp"></div>
    <div style="font-size:var(--text-sm);text-align:center;line-height:1.6;">
      대시보드를 준비하고 있습니다<br>
      <span style="font-size:var(--text-xs);opacity:.75;">잠시만 기다려 주세요…</span>
    </div>
  `;
  body.appendChild(div);
}

function removeBootstrapLoading() {
  const el = document.getElementById('bootstrap-loading');
  if (el) el.remove();
}

// ─── Init ───
// 1) 첫 렌더
//    - 로컬 캐시가 있으면 즉시 대시보드 탭 표시 (재방문자)
//    - 로컬 캐시가 없으면 중립 로딩 화면 표시 (첫 방문자 전용)
if (_hadLocal) {
  render();
  switchView('dashboard-0', null);
} else {
  renderSidebarNav();
  renderBootstrapLoading();
}

// 2) 공용 설정(/dashboards.json) + JWT 토큰을 병렬로 프리페치
_jwt.fetch().catch(err => console.warn('[bootstrap] token warmup failed:', err && err.message));

(async function bootstrapSharedConfig() {
  const shared = await loadSharedConfig();

  if (shared && shared.dashboards.length) {
    dashboards = shared.dashboards;
    categoryOrder = shared.categoryOrder;
    saveToStorage();
    removeBootstrapLoading();
    render();
    switchView('dashboard-0', null);
    return;
  }

  if (!_hadLocal) {
    removeBootstrapLoading();
    dashboards = [];
    render();
  }
})();
</script>
</body>
</html>
